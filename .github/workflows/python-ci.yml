name: Python CI

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install pylint

    - name: Run Pylint
      run: |
        pylint app.py

    - name: Run Unit Tests
      run: |
        python -m unittest test_app.py